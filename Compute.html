<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fancy Discount Calculator</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #e0f7fa, #f1f8e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .calculator {
    background-color: #ffffff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 450px;
  }
  h2 {
    text-align: center;
    color: #00796b;
  }
  label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
    color: #333;
  }
  input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background-color: #00796b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover {
    background-color: #004d40;
  }
  .result {
    margin-top: 25px;
    background-color: #004d40;
    color: #fff;
    padding: 15px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
    font-size: 18px;
  }
  .steps {
    margin-top: 20px;
    background-color: #e0f2f1;
    padding: 15px;
    border-radius: 10px;
    color: #004d40;
    font-size: 14px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: right;
  }
  th {
    background-color: #00796b;
    color: white;
  }
  td.label {
    text-align: left;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>

<div class="calculator">
  <h2>💳 Patients bills and Discounts</h2>

  <label for="bill">Original Bill USD:</label>
  <input type="number" id="bill" placeholder="Outstanding balance" min="0" />

  <label for="firstDiscountAmount">Amount discounted by Client:</label>
  <input type="number" id="firstDiscountAmount" placeholder="Amount discounted by Client" min="0" />

  <label for="additionalDiscount">Additional Discount (%):</label>
  <input type="number" id="additionalDiscount" placeholder="Percentage" min="0" max="100" />

  <button onclick="calculateFinal()">Calculate Final Amount</button>

  <div class="steps" id="steps"></div>
  <div class="result" id="result"></div>
</div>

<script>
function calculateFinal() {
  const bill = parseFloat(document.getElementById('bill').value);
  let firstDiscountAmount = parseFloat(document.getElementById('firstDiscountAmount').value);
  let additionalDiscount = parseFloat(document.getElementById('additionalDiscount').value);
  const maxCombinedDiscount = 60;

  if (isNaN(bill) || isNaN(firstDiscountAmount) || isNaN(additionalDiscount)) {
    alert("Please fill in all fields with valid numbers.");
    return;
  }

  if (bill <= 0) {
    alert("Original bill must be greater than zero.");
    return;
  }

  if (firstDiscountAmount < 0 || firstDiscountAmount > bill) {
    alert("Amount discounted by Client must be between 0 and the original bill.");
    return;
  }

  if (additionalDiscount < 0) {
    alert("Additional discount cannot be negative.");
    return;
  }

  // First discount percent
  const firstDiscountPercent = (firstDiscountAmount / bill) * 100;
  let totalDiscountPercent = firstDiscountPercent + additionalDiscount;

  // Cap total discount
  if (totalDiscountPercent > maxCombinedDiscount) {
    additionalDiscount = Math.max(0, maxCombinedDiscount - firstDiscountPercent);
    totalDiscountPercent = maxCombinedDiscount;
  }

  // Remaining amount
  const remainingAmount = bill - firstDiscountAmount;

  // Remaining percentage (rounded to 2 decimals FIRST)
  let remainingPercentDecimal = (100 - additionalDiscount) / 100;
  remainingPercentDecimal = parseFloat(remainingPercentDecimal.toFixed(2));

  // Now multiply using the SAME rounded value
  const amountToOffer = parseFloat(
    (remainingAmount * remainingPercentDecimal).toFixed(2)
  );

  document.getElementById('steps').innerHTML = `
    <strong>Step-by-Step Calculation:</strong>
    <table>
      <tr>
        <th>Description</th>
        <th>Amount / Value</th>
      </tr>
      <tr>
        <td class="label">Original Bill</td>
        <td>$${bill.toFixed(2)}</td>
      </tr>
      <tr>
        <td class="label">Discount by Client</td>
        <td>$${firstDiscountAmount.toFixed(2)}</td>
      </tr>
      <tr>
        <td class="label">Balance After First Discount</td>
        <td>$${remainingAmount.toFixed(2)}</td>
      </tr>
      <tr>
        <td class="label">Additional Discount Applied</td>
        <td>${additionalDiscount.toFixed(2)}%</td>
      </tr>
      <tr>
        <td class="label">Total Combined Discount</td>
        <td>${totalDiscountPercent.toFixed(2)}%</td>
      </tr>
      <tr>
        <td class="label">Remaining Payable Percentage</td>
        <td>${(remainingPercentDecimal * 100).toFixed(2)}% (decimal: ${remainingPercentDecimal})</td>
      </tr>
      <tr>
        <td class="label">Final Calculation</td>
        <td>${remainingPercentDecimal} × ${remainingAmount.toFixed(2)} = $${amountToOffer}</td>
      </tr>
    </table>
  `;

  document.getElementById('result').innerText =
    `Final Amount to Pay: $${amountToOffer}`;
}
</script>
